# Smithery configuration — https://smithery.ai/docs
# Lets users install/run the ALT eSIM MCP server from Smithery.
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      altesimApiBase:
        type: string
        title: ALT eSIM API base URL
        description: Override the API base (default https://altesim.com)
        default: "https://altesim.com"
  exampleConfig:
    altesimApiBase: "https://altesim.com"
  commandFunction: |
    (config) => ({
      command: "npx",
      args: ["-y", "esim-mcp-server"],
      env: { ALTESIM_API_BASE: (config && config.altesimApiBase) || "https://altesim.com" }
    })
